name: AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      # 1. Baixa o código do repositório Java (o que está sendo alterado)
      - name: Checkout Java Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Baixa o código da sua ferramenta de IA (o projeto Python)
      - name: Checkout Reviewer Tool
        uses: actions/checkout@v4
        with:
          repository: julianoBeerg/python_code_reviewer_mvp
          path: reviewer-tool
          token: ${{ secrets.TOKEN_GITHUB }}

      # 3. Configura o Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 4. Instala as dependências da ferramenta de IA
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r reviewer-tool/requirements.txt

      # 5. Executa a Revisão
      - name: Run AI Review
        env:
          # Segredo que você deve configurar no repo Java
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.TOKEN_GITHUB }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          # Adiciona a pasta da ferramenta ao caminho do Python
          export PYTHONPATH=$PYTHONPATH:$(pwd)/reviewer-tool
          
          # 1. Indexa o README e docs do projeto Java para dar contexto à IA
          python -m src.cli index --repo .
          
          # 2. Roda a análise no PR atual
          python -m src.cli review --pr-id ${{ github.event.pull_request.number }} --platform github
